{{- if .Values.canary.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopkube-canary
  namespace: shopkube
  labels:
    app: shopkube
    version: canary
spec:
  replicas: {{ .Values.canary.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: shopkube
      version: canary
  template:
    metadata:
      labels:
        app: shopkube
        version: canary
    spec:
      containers:
      - name: shopkube
        image: "{{ .Values.canary.image.repository }}:{{ .Values.canary.image.tag }}"
        imagePullPolicy: {{ .Values.canary.image.pullPolicy | default "Always" }}
        ports:
        - containerPort: 8000
        env:
        - name: APP_VERSION
          value: "{{ .Values.canary.env.APP_VERSION }}"
        - name: DATABASE_URL
          value: "{{ .Values.env.DATABASE_URL }}"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
{{- end }}

